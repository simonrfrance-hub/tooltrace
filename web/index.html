<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Localizit — Live Asset Tracking Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root { --bg:#0f1419; --panel:#1a2230; --line:#2a3548; --txt:#e6edf3; --mut:#8b98a9;
          --accent:#0284c7; --red:#ef4444; --amber:#f59e0b; --green:#22c55e; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:var(--bg); color:var(--txt); display:flex; height:100vh; overflow:hidden; }
  #side { width:380px; min-width:380px; background:var(--panel); border-right:1px solid var(--line);
          display:flex; flex-direction:column; }
  header { padding:16px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:18px; }
  header p { margin:4px 0 0; color:var(--mut); font-size:12px; }
  #map { flex:1; }
  .section { padding:12px 16px; border-bottom:1px solid var(--line); }
  .section h2 { margin:0 0 8px; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--mut); }
  .asset { padding:8px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; cursor:pointer; }
  .asset.active { border-color:var(--accent); background:rgba(2,132,199,.08); }
  .asset .row { display:flex; justify-content:space-between; align-items:center; }
  .asset .name { font-weight:600; }
  .asset .meta { color:var(--mut); font-size:12px; margin-top:2px; }
  .badge { font-size:10px; padding:2px 6px; border-radius:99px; background:var(--line); color:var(--mut); }
  .badge.stolen { background:rgba(239,68,68,.2); color:#fca5a5; }
  .scroll { overflow-y:auto; }
  .controls { display:flex; flex-wrap:wrap; gap:6px; }
  button { font:inherit; cursor:pointer; border:1px solid var(--line); background:#243044; color:var(--txt);
           padding:6px 10px; border-radius:7px; }
  button:hover { border-color:var(--accent); }
  button.alt { background:transparent; }
  .alert { padding:8px 10px; border-left:3px solid var(--mut); background:#141c28; border-radius:0 6px 6px 0; margin-bottom:6px; }
  .alert.geofence_exit { border-color:var(--red); }
  .alert.movement { border-color:var(--amber); }
  .alert.reappeared { border-color:var(--green); }
  .alert .t { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--mut); }
  .alert .m { font-size:13px; margin-top:2px; }
  .alert .dev { font-size:11px; color:var(--mut); margin-top:2px; }
  .alerts-wrap { flex:1; }
  .addtag { display:flex; flex-direction:column; gap:6px; }
  .addtag input { font:inherit; background:#141c28; border:1px solid var(--line); color:var(--txt);
                  padding:7px 9px; border-radius:7px; width:100%; }
  .addtag input:focus, .addtag textarea:focus { outline:none; border-color:var(--accent); }
  .addtag textarea { font:13px/1.4 ui-monospace,Menlo,monospace; background:#141c28;
                     border:1px solid var(--line); color:var(--txt); padding:7px 9px; border-radius:7px; width:100%; resize:vertical; }
  .asset .acts { display:flex; gap:6px; margin-top:6px; }
  .asset .acts button { font-size:11px; padding:3px 8px; }
  .asset .acts .del:hover { border-color:var(--red); color:#fca5a5; }
  .fencerow { display:flex; gap:6px; }
  .fencerow input { flex:1; }
  #t_msg.ok { color:var(--green); } #t_msg.err { color:var(--red); }
</style>
</head>
<body>
  <div id="side">
    <header>
      <h1>Localizit</h1>
      <p>Live asset tracking — webhook ingest, geofences &amp; movement alerts</p>
    </header>

    <div class="section">
      <h2>Simulate pings <span id="simdev" style="text-transform:none;color:var(--accent)"></span></h2>
      <div class="controls">
        <button onclick="sim('jitter')" class="alt">Jitter (no alert)</button>
        <button onclick="sim('drift')">Move 120m</button>
        <button onclick="sim('escape')">Leave geofence</button>
        <button onclick="sim('silent')">Reappear after silence</button>
      </div>
      <div class="controls" style="margin-top:8px">
        <button onclick="toggleStolen()" class="alt" id="stolenBtn">Toggle stolen mode</button>
      </div>
    </div>

    <div class="section">
      <h2>Add a tag</h2>
      <div class="addtag">
        <input id="t_id" placeholder="Device ID (printed on the SpaceTag)" />
        <input id="t_name" placeholder="Name — e.g. Makita drill" />
        <input id="t_site" placeholder="Site / owner (optional)" />
        <div class="fencerow">
          <input id="t_radius" type="number" placeholder="Geofence radius (m, optional)" />
          <button onclick="useMapCentre()" class="alt" title="Use current map centre as the geofence centre">Centre on map</button>
        </div>
        <div id="t_fencehint" class="meta" style="color:var(--mut)"></div>
        <button onclick="addTag()">Add tag</button>
        <div id="t_msg" class="meta"></div>
      </div>
      <details style="margin-top:10px">
        <summary style="cursor:pointer;color:var(--mut);font-size:12px">Bulk import (CSV)</summary>
        <div class="addtag" style="margin-top:8px">
          <div class="meta" style="color:var(--mut)">One tag per line: <code>device_id, name, site, radius_m</code></div>
          <textarea id="t_csv" rows="4" placeholder="SPACETAG-001, Makita drill, Greenfield, 250&#10;SPACETAG-002, DeWalt saw, Greenfield"></textarea>
          <button onclick="importCsv()">Import tags</button>
          <div id="t_imsg" class="meta"></div>
        </div>
      </details>
    </div>

    <div class="section scroll" style="max-height:240px">
      <h2>Tracked assets</h2>
      <div id="assets"></div>
    </div>

    <div class="section scroll alerts-wrap">
      <h2>Live alerts</h2>
      <div id="alerts"></div>
    </div>
  </div>
  <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, selected = null;
const layers = { markers:{}, track:null, fence:null };

function init() {
  map = L.map('map').setView([-36.8485, 174.7633], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
  refresh();
  setInterval(refresh, 3000);
}

async function refresh() {
  const assets = await (await fetch('/api/assets')).json();
  if (!selected && assets.length) selected = assets[0].device_id;
  renderAssets(assets);
  renderMarkers(assets);
  await renderTrackAndFence(assets);
  renderAlerts(await (await fetch('/api/alerts')).json());
  const sel = assets.find(a => a.device_id === selected);
  document.getElementById('simdev').textContent = sel ? '— ' + sel.name : '';
  document.getElementById('stolenBtn').textContent =
    sel && sel.stolen_mode ? 'Stolen mode: ON' : 'Toggle stolen mode';
}

function renderAssets(assets) {
  document.getElementById('assets').innerHTML = assets.map(a => `
    <div class="asset ${a.device_id===selected?'active':''}" onclick="select('${a.device_id}')">
      <div class="row">
        <span class="name">${esc(a.name)}</span>
        <span class="badge ${a.stolen_mode?'stolen':''}">${a.stolen_mode?'STOLEN':'normal'}</span>
      </div>
      <div class="meta">${esc(a.site||'—')} · ${a.last? 'last seen '+ago(a.last.received_at) : 'no reports yet'}</div>
      <div class="acts">
        <button onclick="editTag(event,'${a.device_id}')" class="alt">Edit</button>
        <button onclick="deleteTag(event,'${a.device_id}')" class="alt del">Delete</button>
      </div>
    </div>`).join('');
}

function renderMarkers(assets) {
  for (const a of assets) {
    if (!a.last) continue;
    const ll = [a.last.latitude, a.last.longitude];
    if (layers.markers[a.device_id]) layers.markers[a.device_id].setLatLng(ll);
    else layers.markers[a.device_id] = L.marker(ll).addTo(map).bindPopup(esc(a.name));
  }
}

async function renderTrackAndFence(assets) {
  const a = assets.find(x => x.device_id === selected);
  if (!a) return;
  if (layers.fence) { map.removeLayer(layers.fence); layers.fence = null; }
  if (a.fence_lat != null) {
    layers.fence = L.circle([a.fence_lat, a.fence_lng],
      { radius:a.fence_radius_m, color:'#0284c7', fillOpacity:.06 }).addTo(map);
  }
  const track = await (await fetch(`/api/assets/${a.device_id}/track`)).json();
  if (layers.track) { map.removeLayer(layers.track); layers.track = null; }
  if (track.length > 1) {
    layers.track = L.polyline(track.map(t => [t.latitude, t.longitude]),
      { color:'#f59e0b', weight:3, opacity:.7 }).addTo(map);
  }
}

function renderAlerts(alerts) {
  document.getElementById('alerts').innerHTML = alerts.length ? alerts.map(a => `
    <div class="alert ${a.type}">
      <div class="t">${a.type.replace('_',' ')}</div>
      <div class="m">${esc(a.message)}</div>
      <div class="dev">${esc(a.device_id)} · ${ago(a.created_at)}</div>
    </div>`).join('') : '<div class="meta" style="color:var(--mut)">No alerts yet — try the simulator above.</div>';
}

// --- Add-tag form ---------------------------------------------------------
let pendingFence = null; // {lat,lng} chosen from map centre
function useMapCentre(){
  const c = map.getCenter();
  pendingFence = { lat:+c.lat.toFixed(6), lng:+c.lng.toFixed(6) };
  document.getElementById('t_fencehint').textContent =
    `Geofence centre set to map view (${pendingFence.lat}, ${pendingFence.lng}). Pan the map to change.`;
}
async function addTag(){
  const msg = document.getElementById('t_msg');
  const body = {
    device_id: val('t_id'), name: val('t_name'), site: val('t_site'),
  };
  const radius = parseFloat(val('t_radius'));
  if (Number.isFinite(radius) && pendingFence) {
    body.fence_lat = pendingFence.lat; body.fence_lng = pendingFence.lng; body.fence_radius_m = radius;
  }
  const r = await fetch('/api/assets', { method:'POST',
    headers:{'content-type':'application/json'}, body: JSON.stringify(body) });
  const data = await r.json();
  if (r.ok) {
    msg.className = 'meta ok'; msg.textContent = `Added "${data.name}".`;
    ['t_id','t_name','t_site','t_radius'].forEach(id => document.getElementById(id).value = '');
    pendingFence = null; document.getElementById('t_fencehint').textContent = '';
    selected = data.device_id; refresh();
  } else {
    msg.className = 'meta err'; msg.textContent = data.message || 'Could not add tag.';
  }
}
function val(id){ return document.getElementById(id).value; }

async function importCsv(){
  const msg = document.getElementById('t_imsg');
  const csv = val('t_csv');
  const r = await fetch('/api/assets/import', { method:'POST',
    headers:{'content-type':'application/json'}, body: JSON.stringify({ csv }) });
  const d = await r.json();
  if (r.ok) {
    msg.className = 'meta ok';
    msg.textContent = `Imported ${d.added} tag(s)` + (d.skipped ? `, skipped ${d.skipped}.` : '.');
    document.getElementById('t_csv').value = ''; refresh();
  } else { msg.className = 'meta err'; msg.textContent = d.message || 'Import failed.'; }
}

async function editTag(e, id){
  e.stopPropagation();
  const a = (await (await fetch('/api/assets')).json()).find(x => x.device_id === id);
  if (!a) return;
  const name = prompt('Tag name:', a.name); if (name === null) return;
  const site = prompt('Site / owner:', a.site || ''); if (site === null) return;
  await fetch('/api/assets/'+id, { method:'PUT', headers:{'content-type':'application/json'},
    body: JSON.stringify({ name, site }) });
  refresh();
}

async function deleteTag(e, id){
  e.stopPropagation();
  if (!confirm('Delete this tag and all its location history & alerts?')) return;
  await fetch('/api/assets/'+id, { method:'DELETE' });
  if (selected === id) selected = null;
  refresh();
}

function select(id){ selected = id; refresh(); }
async function sim(step){
  await fetch('/api/simulate', { method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({ deviceId: selected, step }) });
  const a = (await (await fetch('/api/assets')).json()).find(x=>x.device_id===selected);
  if (a && a.last) map.panTo([a.last.latitude, a.last.longitude]);
  refresh();
}
async function toggleStolen(){
  const a = (await (await fetch('/api/assets')).json()).find(x=>x.device_id===selected);
  if (!a) return;
  await fetch('/api/assets/'+selected, { method:'PUT', headers:{'content-type':'application/json'},
    body: JSON.stringify({ stolen_mode: a.stolen_mode ? 0 : 1 }) });
  refresh();
}

function esc(s){ return String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function ago(t){
  if(!t) return '—';
  // Accept ISO ("...Z") or SQLite-style ("YYYY-MM-DD HH:MM:SS") timestamps.
  let iso = String(t).replace(' ', 'T');
  if(!/[zZ]|[+-]\d\d:?\d\d$/.test(iso)) iso += 'Z';
  const s = Math.max(0,(Date.now()-Date.parse(iso))/1000);
  if(Number.isNaN(s)) return '—';
  if(s<60) return Math.round(s)+'s ago';
  if(s<3600) return Math.round(s/60)+'m ago';
  return Math.round(s/3600)+'h ago';
}
init();
</script>
</body>
</html>
